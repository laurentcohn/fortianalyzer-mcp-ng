services:
  fortianalyzer-mcp-ng:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fortianalyzer-mcp-ng
    env_file:
      - .env
    ports:
      - "${MCP_SERVER_PORT:-8001}:8001"
    environment:
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: 8001
      MCP_SERVER_MODE: http
      DOCKER_CONTAINER: "1"
      LOG_FILE: /app/logs/fortianalyzer-mcp-ng.log
      FAZ_ALLOWED_OUTPUT_DIRS: /app/output
    volumes:
      - ./logs:/app/logs
      - ./output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - fortianalyzer-mcp-ng

networks:
  fortianalyzer-mcp-ng:
    driver: bridge
